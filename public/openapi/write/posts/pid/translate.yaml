post:
  tags:
    - posts
  summary: translate a post
  description: This operation translates a post to English.
  parameters:
    - in: path
      name: pid
      schema:
        type: string
      required: true
      description: a valid post id
      example: 2
  responses:
    '200':
      description: Post successfully translated
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                $ref: ../../../components/schemas/Status.yaml#/Status
              response:
                type: object
                properties:
                  translated:
                    type: boolean
                  content:
                    type: string
                  original:
                    type: string
